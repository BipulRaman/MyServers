name: Build & Release

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
      - '.github/workflows/build.yml'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

# Cancel superseded runs on the same branch/PR to save runner minutes.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"      # pointless in CI, bloats the cache
  CARGO_NET_RETRY: "10"
  RUSTFLAGS: "-C debuginfo=0"  # no debug info in release binaries

jobs:
  # ─── 1. Compute the version tag ONCE, share with every matrix job ──────────
  # This avoids 4 parallel `git rev-list` calls and guarantees all artifacts
  # agree on the same version string even if a commit lands mid-run.
  meta:
    runs-on: ubuntu-latest
    outputs:
      build_tag: ${{ steps.v.outputs.tag }}
      build_label: ${{ steps.v.outputs.label }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # needed for rev-list --count
      - id: v
        shell: bash
        run: |
          count=$(git rev-list --count HEAD)
          sha=$(git rev-parse --short HEAD)
          tag="v1.0.$count"
          echo "tag=$tag"           >> "$GITHUB_OUTPUT"
          echo "label=$tag+$sha"    >> "$GITHUB_OUTPUT"

  # ─── 2. Build matrix ───────────────────────────────────────────────────────
  build:
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            artifact_name: appnest-windows-x86_64
            binary: appnest.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: appnest-linux-x86_64
            binary: appnest
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: appnest-macos-arm64
            binary: appnest
          - os: macos-13
            target: x86_64-apple-darwin
            artifact_name: appnest-macos-x86_64
            binary: appnest

    runs-on: ${{ matrix.os }}

    env:
      BUILD_TAG:   ${{ needs.meta.outputs.build_tag }}
      BUILD_LABEL: ${{ needs.meta.outputs.build_label }}

    steps:
      - uses: actions/checkout@v4
        # Shallow checkout — we already have the version from the meta job.

      - name: Stamp Cargo.toml version
        shell: bash
        run: |
          ver="${BUILD_TAG#v}"
          awk -v ver="$ver" '
            !done && /^version[[:space:]]*=/ { print "version = \"" ver "\""; done=1; next }
            { print }
          ' app/Cargo.toml > app/Cargo.toml.new
          mv app/Cargo.toml.new app/Cargo.toml
          echo "Stamped version: $ver"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Runner images already ship mingw-w64 under C:\ProgramData\mingw64\mingw64\bin
      # (or at worst C:\ProgramData\Chocolatey\lib\mingw). Point Cargo at it instead
      # of reinstalling every run (saves 30–60s on the Windows leg).
      - name: Configure MinGW (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $candidates = @(
            "C:\ProgramData\mingw64\mingw64\bin",
            "C:\ProgramData\Chocolatey\bin",
            "C:\msys64\mingw64\bin"
          )
          foreach ($p in $candidates) {
            if (Test-Path $p) {
              Add-Content $env:GITHUB_PATH $p
              Write-Host "MinGW found at: $p"
              break
            }
          }
          # Fall back to installing only if nothing is present.
          if (-not (Get-Command gcc -ErrorAction SilentlyContinue)) {
            Write-Host "No preinstalled MinGW found, installing via choco..."
            choco install mingw -y --no-progress
          }

      # apt-get update + install is cached by the runner image for 24h, but the
      # actual package download still dominates. `runner.arch` + a fixed key lets
      # us restore the apt cache across runs.
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libgtk-3-dev

      # Swatinem/rust-cache is dramatically faster and smarter than actions/cache
      # for Cargo: it caches registry + git + target/, keys on Cargo.lock +
      # rustc version + target triple, and prunes stale artifacts automatically.
      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app
          key: ${{ matrix.target }}
          # Share the cache across main/PR builds for the same target.
          shared-key: release-${{ matrix.target }}
          # Don't save the cache on PRs — only on main pushes / tags.
          save-if: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/') }}

      - name: Build release
        working-directory: app
        shell: bash
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          src="app/target/${{ matrix.target }}/release/${{ matrix.binary }}"
          cp "$src" "dist/${{ matrix.binary }}"
          if [[ "${{ runner.os }}" != "Windows" ]]; then
            chmod +x "dist/${{ matrix.binary }}"
            tar -C dist -czf "dist/${{ matrix.artifact_name }}.tar.gz" "${{ matrix.binary }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.binary }}
            dist/*.tar.gz
          if-no-files-found: error
          retention-days: 14
          compression-level: 0  # binaries are already ~incompressible; skip zip CPU

  # ─── 3. Single release job, runs once after all builds succeed ────────────
  # Previously every matrix leg raced to call softprops/action-gh-release,
  # each regenerating release notes. Now it's published exactly once.
  release:
    needs: [meta, build]
    runs-on: ubuntu-latest
    # Only actually publish on main pushes or version tags.
    if: github.event_name != 'pull_request'
    env:
      BUILD_TAG: ${{ needs.meta.outputs.build_tag }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p dist
          find artifacts -type f \( -name 'appnest' -o -name 'appnest.exe' -o -name '*.tar.gz' \) \
            -exec cp {} dist/ \;
          # Rename the raw binaries so each asset on the release is unique.
          if [ -f dist/appnest.exe ]; then
            mv dist/appnest.exe dist/appnest-windows-x86_64.exe
          fi
          if [ -f dist/appnest ]; then
            rm dist/appnest   # the per-OS .tar.gz already carries the executable
          fi
          ls -la dist

      - name: Generate checksums
        shell: bash
        working-directory: dist
        run: sha256sum * > SHA256SUMS.txt

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUILD_TAG }}
          name: ${{ env.BUILD_TAG }}
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
