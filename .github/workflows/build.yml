name: Build & Release

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-gnu
            artifact_name: appnest-windows-x86_64
            binary: appnest.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: appnest-linux-x86_64
            binary: appnest
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: appnest-macos-arm64
            binary: appnest
          - os: macos-13
            target: x86_64-apple-darwin
            artifact_name: appnest-macos-x86_64
            binary: appnest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate build number (Windows)
        if: runner.os == 'Windows'
        id: buildnum_win
        shell: pwsh
        run: |
          $count = (git rev-list --count HEAD)
          $sha = (git rev-parse --short HEAD)
          $tag = "v1.0.$count"
          echo "BUILD_TAG=$tag" >> $env:GITHUB_ENV
          echo "BUILD_LABEL=$tag+$sha" >> $env:GITHUB_ENV

      - name: Generate build number (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          count=$(git rev-list --count HEAD)
          sha=$(git rev-parse --short HEAD)
          tag="v1.0.$count"
          echo "BUILD_TAG=$tag" >> "$GITHUB_ENV"
          echo "BUILD_LABEL=$tag+$sha" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Stamp Cargo.toml version (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = "${{ env.BUILD_TAG }}".TrimStart('v')
          $path = "app/Cargo.toml"
          $content = Get-Content $path -Raw
          $updated = [regex]::Replace($content, '(?m)^version\s*=\s*"[^"]+"', "version = `"$ver`"", 1)
          Set-Content -Path $path -Value $updated -NoNewline
          Write-Host "Stamped version: $ver"

      - name: Stamp Cargo.toml version (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ver="${BUILD_TAG#v}"
          # Replace the first `version = "..."` line in app/Cargo.toml.
          # Use a temp file so this works on both GNU sed (Linux) and BSD sed (macOS).
          awk -v ver="$ver" '
            !done && /^version[[:space:]]*=/ { print "version = \"" ver "\""; done=1; next }
            { print }
          ' app/Cargo.toml > app/Cargo.toml.new
          mv app/Cargo.toml.new app/Cargo.toml
          echo "Stamped version: $ver"
          grep '^version' app/Cargo.toml | head -n1

      - name: Install MinGW (Windows)
        if: runner.os == 'Windows'
        run: choco install mingw -y

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('app/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release
        working-directory: app
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item "app/target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.binary }}"

      - name: Prepare artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "app/target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.binary }}"
          chmod +x "dist/${{ matrix.binary }}"
          # Ship a .tar.gz for Unix releases so the +x bit survives.
          tar -C dist -czf "dist/${{ matrix.artifact_name }}.tar.gz" "${{ matrix.binary }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.binary }}
            dist/*.tar.gz

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUILD_TAG }}
          name: ${{ env.BUILD_TAG }}
          files: |
            dist/${{ matrix.binary }}
            dist/*.tar.gz
          generate_release_notes: true
