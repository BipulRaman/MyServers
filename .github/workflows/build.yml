name: Build & Release

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate build number
        id: buildnum
        shell: pwsh
        run: |
          $count = (git rev-list --count HEAD)
          $sha = (git rev-parse --short HEAD)
          $tag = "v1.0.$count"
          echo "BUILD_TAG=$tag" >> $env:GITHUB_ENV
          echo "BUILD_LABEL=$tag+$sha" >> $env:GITHUB_ENV
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Install Rust (GNU toolchain)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install MinGW
        run: choco install mingw -y

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            app/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('app/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release
        working-directory: app
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Prepare artifact
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item app/target/x86_64-pc-windows-gnu/release/myservers.exe dist/myservers.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: myservers-windows
          path: dist/myservers.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.BUILD_TAG }}
          name: ${{ env.BUILD_TAG }}
          files: dist/myservers.exe
          generate_release_notes: true
