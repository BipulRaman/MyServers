<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>AppNest</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236366f1' stroke-width='1.8'%3E%3Ccircle cx='12' cy='12' r='3'/%3E%3Cpath d='M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z'/%3E%3C/svg%3E"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <script>
    // Apply theme before paint to prevent flash
    (function(){
      try{
        var t = localStorage.getItem('theme');
        if(!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', t);
      }catch(e){}
    })();
  </script>
</head>
<body>

  <header class="header">
    <div class="header-left">
      <svg class="logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <h1>AppNest</h1>
    </div>
    <div class="header-right">
      <button class="theme-toggle" id="btnTheme" title="Toggle theme" aria-label="Toggle theme">
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </button>
      <button class="btn btn-accent" id="btnAdd">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Application
      </button>
    </div>
  </header>

  <main class="main">
    <div class="list-toolbar">
      <div class="filter-chips" role="tablist">
        <button class="chip active" data-filter="all" role="tab">
          All <span class="chip-count" id="statAll">0</span>
        </button>
        <button class="chip" data-filter="running" role="tab">
          <span class="chip-dot running"></span>
          Running <span class="chip-count" id="statRunning">0</span>
        </button>
        <button class="chip" data-filter="stopped" role="tab">
          <span class="chip-dot stopped"></span>
          Stopped <span class="chip-count" id="statStopped">0</span>
        </button>
      </div>
      <div class="search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Search apps…" autocomplete="off"/>
        <kbd>/</kbd>
      </div>
    </div>
    <div id="appList"></div>
  </main>

  <div id="toastBox" class="toast-wrap"></div>

  <!-- ═══ Confirm Dialog ═══ -->
  <div id="confirmModal" class="overlay hidden"><div class="overlay-bg"></div>
    <div class="dialog dialog-sm">
      <div class="dialog-body">
        <h3 id="confirmTitle" class="confirm-title">Are you sure?</h3>
        <p id="confirmMessage" class="confirm-message"></p>
        <div class="dialog-foot confirm-foot">
          <button type="button" class="btn btn-flat" id="confirmCancel">Cancel</button>
          <button type="button" class="btn btn-danger" id="confirmOk">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ Command Palette ═══ -->
  <div id="paletteModal" class="overlay hidden"><div class="overlay-bg"></div>
    <div class="palette">
      <div class="palette-input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="paletteInput" placeholder="Type to search apps or actions…" autocomplete="off"/>
        <kbd>Esc</kbd>
      </div>
      <div id="paletteResults" class="palette-results"></div>
      <div class="palette-foot">
        <span><kbd>↑</kbd><kbd>↓</kbd> navigate</span>
        <span><kbd>Enter</kbd> run</span>
        <span><kbd>Esc</kbd> close</span>
      </div>
    </div>
  </div>

  <!-- ═══ Add/Edit Modal ═══ -->
  <div id="modal" class="overlay hidden"><div class="overlay-bg"></div>
    <div class="dialog">
      <div class="dialog-head">
        <h2 id="modalTitle">New Application</h2>
        <button class="icon-btn" onclick="closeModal('modal')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <form id="appForm" autocomplete="off" class="dialog-body">
        <input type="hidden" id="fId"/>

        <div class="field">
          <label for="fName">Application Name</label>
          <input type="text" id="fName" required/>
        </div>

        <div class="field-row">
          <div class="field" style="width:140px">
            <label for="fType">Type</label>
            <select id="fType">
            </select>
          </div>
          <div class="field" style="width:120px">
            <label for="fMode">Mode</label>
            <select id="fMode">
              <option value="dev">Dev</option>
              <option value="release">Release</option>
            </select>
          </div>
          <div class="field grow">
            <label for="fDir">Project Directory</label>
            <div class="field-with-btn">
              <input type="text" id="fDir" required/>
              <button type="button" class="browse-btn" onclick="pickFolder('fDir')">Browse</button>
            </div>
          </div>
        </div>

        <div class="field-row">
          <div class="field" style="width:140px">
            <label for="fServe">Serve Mode</label>
            <select id="fServe">
              <option value="command">Command</option>
              <option value="static">Static Folder</option>
              <option value="script">Script File</option>
            </select>
          </div>
          <div class="field" style="width:100px">
            <label for="fPort">Port</label>
            <input type="number" id="fPort"/>
          </div>
          <div class="field grow hidden" id="fStaticWrap">
            <label for="fStatic">Static Folder</label>
            <input type="text" id="fStatic"/>
          </div>
          <div class="field grow hidden" id="fScriptWrap">
            <label for="fScript">Script File</label>
            <div class="field-with-btn">
              <input type="text" id="fScript"/>
              <button type="button" class="browse-btn" onclick="pickScript()">Browse</button>
            </div>
          </div>
        </div>

        <div class="field">
          <label for="fBuild">Build &amp; Run Command <span class="field-hint">one command per line — last line is the run command</span></label>
          <textarea id="fBuild" rows="4"></textarea>
        </div>

        <div class="field">
          <label for="fEnv">Environment Variables <span class="field-hint">KEY=VALUE per line</span></label>
          <textarea id="fEnv" rows="2"></textarea>
        </div>

        <label class="switch-row">
          <span class="switch"><input type="checkbox" id="fAuto"/><span class="track"></span></span>
          Auto-start when AppNest launches
        </label>

        <div class="dialog-foot">
          <button type="button" class="btn btn-flat" onclick="closeModal('modal')">Cancel</button>
          <button type="submit" class="btn btn-accent">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ═══ Logs Modal ═══ -->
  <div id="logModal" class="overlay hidden"><div class="overlay-bg"></div>
    <div class="dialog dialog-lg">
      <div class="dialog-head">
        <h2 id="logTitle">Logs</h2>
        <div class="head-actions">
          <button class="btn btn-flat btn-sm" id="btnWrapLog" title="Toggle word wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="ic"><path d="M3 6h18"/><path d="M3 12h15a3 3 0 1 1 0 6h-4"/><polyline points="13 16 11 18 13 20"/><path d="M3 18h4"/></svg>
            Text Wrap
          </button>
          <button class="btn btn-flat btn-sm" id="btnCopyLog">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="ic"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy
          </button>
          <button class="btn btn-flat btn-sm" id="btnExportLog">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="ic"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Export
          </button>
          <button class="icon-btn" id="btnCloseLogs"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
        </div>
      </div>
      <div class="dialog-body">
        <div class="tab-bar">
          <button class="tab active" data-tab="run">Runtime</button>
          <button class="tab" data-tab="build">Build</button>
          <button class="tab" data-tab="applog">Persisted Log</button>
        </div>
        <div class="log-toolbar">
          <div class="log-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="logSearchInput" placeholder="Filter / search in logs…" autocomplete="off"/>
            <span class="log-search-count" id="logSearchCount"></span>
          </div>
          <button class="follow-pill is-following" id="followPill" title="Click to pause auto-scroll">Following</button>
        </div>
        <pre id="logContent" class="terminal nowrap"></pre>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
